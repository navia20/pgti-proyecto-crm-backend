services:
  db:
    image: postgres:15-alpine
    container_name: nest_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: superpassword123
      POSTGRES_DB: appdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nest_network

  app:
    build: .
    container_name: nest_app
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: appuser
      DB_PASSWORD: superpassword123
      DB_NAME: appdb
    ports:
      - "3000:3000"
    networks:
      - nest_network

networks:
  nest_network:

volumes:
  postgres_data: